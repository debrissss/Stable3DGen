# Hi3DGen Single Image 3D Reconstruction Configuration File
# Hi3DGen 单图 3D 重建配置文件

# ==============================================================================
# 1. 路径与核心参数 (Path and Core Parameters)
# ==============================================================================

# 输入的单图文件路径
# 示例: "input/fs13.jpg"
input_image: "input/fs13.jpg"

# 输出的 3D 模型文件路径，后缀决定导出格式
# 支持格式: .glb, .obj, .ply, .stl 等
# 示例: "output/fs13_mesh.obj"
output_mesh: "output/fs13_mesh.obj"

# 随机种子，设置为 -1 表示每次运行都随机生成
# 默认值: 0
# 更改效果: 
#   - 固定值 (如 0, 42): 确保相同的输入图像每次生成完全一致的 3D 网格拓扑结构，用于对比调参。
#   - 随机 (-1): 每次生成都可能在物体微观结构、轮廓细节上存在一定随机扰动，有助于探索不同的生成样式。
seed: 0


# ==============================================================================
# 2. Stage 1: Sparse Structure (稀疏结构生成控制)
# ==============================================================================

# 第一阶段稀疏结构的 Classifier-Free Guidance (CFG) 强度
# 默认值: 3.0
# 更改效果:
#   - 提高值 (例如 4.0 - 5.0): 强制模型更紧密地贴合输入图像预测的法向图。这会产生更清晰、明确的边缘，
#     但也可能因为约束过强而导致局部出现结构畸变或硬转折。
#   - 降低值 (例如 1.0 - 2.0): 弱化图像约束，生成的几何形状会更加柔和、富有创造力，但可能会偏离输入图的轮廓，
#     甚至导致关键细节模糊不清。
ss_guidance_strength: 5.0

# 第一阶段稀疏结构采样迭代步数 (Flow Matching Steps)
# 默认值: 50
# 更改效果:
#   - 提高值 (例如 80 - 100): 能够对物体的初始粗糙点云结构进行更精细、平滑的流匹配积分，提升模型的拓扑结构精度与完整性，
#     但第一阶段的推理时间会线性增长。
#   - 降低值 (例如 20 - 30): 大幅缩短生成耗时，但在复杂几何边缘处可能会丢失部分空间点云，导致网格重建后出现孔洞或断裂。
ss_sampling_steps: 50


# ==============================================================================
# 3. Stage 2: Structured Latent (结构化潜空间与网格网格精细化)
# ==============================================================================

# 第二阶段结构化潜空间的 Classifier-Free Guidance (CFG) 强度
# 默认值: 3.0
# 更改效果:
#   - 提高值 (例如 4.0 - 5.0): 会显著放大物体表面的三维细节和纹理起伏，让浮雕、刻线等微观结构更加突出。
#     但值过高可能在平坦区域引入锯齿、破面或几何噪声。
#   - 降低值 (例如 1.0 - 2.0): 重建的 3D 网格表面将更平滑、圆润，能有效消除噪点，但同时会削弱物体表面的细节特征。
slat_guidance_strength: 5.0

# 第二阶段特征精细化采样迭代步数 (Flow Matching Steps)
# 默认值: 6
# 更改效果:
#   - 提高值 (例如 10 - 15): 在第一阶段生成的稀疏结构基础上，对潜在特征进行更精细的解算与重构，
#     有助于优化网格的面片分布和缝隙闭合度，但耗时稍长。
#   - 降低值 (例如 3 - 4): 极速生成模式，但低步数可能导致三维网格表面变得生硬粗糙、甚至出现明显的网格面片撕裂。
slat_sampling_steps: 6
